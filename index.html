<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lobisomens · Gerador de mensagens</title>
  <style>
    :root {
      --bg: #292620;
      --bg-mid: #24211d;
      --bg-deep: #171514;
      --panel: rgba(48, 44, 38, 0.82);
      --panel-soft: rgba(55, 49, 43, 0.88);
      --field: rgba(38, 34, 30, 0.92);
      --text: #ece2d2;
      --text-strong: #fff8ea;
      --muted: #9f9586;
      --muted-dark: #746a5e;
      --accent: #c73b35;
      --accent-bright: #e24a41;
      --accent-deep: #7d2424;
      --accent-soft: rgba(205, 49, 46, 0.16);
      --gold: #b48b51;
      --gold-bright: #d39d56;
      --gold-soft: rgba(211, 157, 86, 0.14);
      --line: rgba(225, 210, 177, 0.11);
      --line-strong: rgba(225, 210, 177, 0.2);
      --shadow: rgba(0, 0, 0, 0.44);
      --success: #23824e;
      --danger: #e24a41;
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at 52% 18%, rgba(211, 157, 86, 0.075), transparent 27rem),
        radial-gradient(circle at 12% 5%, rgba(199, 59, 53, 0.1), transparent 22rem),
        radial-gradient(circle at 88% 90%, rgba(180, 139, 81, 0.055), transparent 26rem),
        linear-gradient(135deg, #302d27 0%, var(--bg) 46%, var(--bg-deep) 100%);
      color: var(--text);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background-image:
        linear-gradient(rgba(255, 248, 234, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 248, 234, 0.012) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 77%);
    }

    body::after {
      background:
        radial-gradient(circle at center, transparent 18%, rgba(0, 0, 0, 0.22) 100%),
        repeating-linear-gradient(115deg, rgba(255, 255, 255, 0.015) 0 1px, transparent 1px 7px);
      opacity: 0.72;
      mix-blend-mode: soft-light;
    }

    main {
      position: relative;
      z-index: 1;
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 50px;
    }

    header {
      display: grid;
      gap: 7px;
      margin-bottom: 22px;
    }

    .eyebrow {
      margin: 0;
      color: var(--gold);
      font-family: Georgia, "Times New Roman", serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.76rem;
      opacity: 0.86;
    }

    h1 {
      margin: 0;
      color: var(--accent-bright);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 5vw, 3.25rem);
      letter-spacing: 0.05em;
      line-height: 0.96;
      text-transform: uppercase;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.38), 0 0 18px rgba(199, 59, 53, 0.16);
    }

    .subtitle {
      max-width: 780px;
      margin: 0;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.55;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(190px, 1fr) minmax(220px, 1fr) auto;
      gap: 16px;
      align-items: end;
      margin: 26px 0 16px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(61, 55, 48, 0.72), rgba(37, 34, 30, 0.91)),
        radial-gradient(circle at 20% 0%, rgba(211, 157, 86, 0.1), transparent 18rem);
      box-shadow: 0 18px 44px var(--shadow), inset 0 1px 0 rgba(255, 248, 234, 0.04);
      backdrop-filter: blur(10px);
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label,
    legend {
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    input[type="number"] {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--field);
      color: var(--text-strong);
      font: inherit;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    input[type="number"]:focus {
      border-color: rgba(199, 59, 53, 0.64);
      box-shadow: 0 0 0 4px var(--accent-soft), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    fieldset {
      margin: 0;
      padding: 0;
      border: 0;
    }

    .radio-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .radio-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 248, 234, 0.04);
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .radio-pill:has(input:checked) {
      border-color: rgba(199, 59, 53, 0.72);
      background: linear-gradient(180deg, rgba(199, 59, 53, 0.2), rgba(125, 36, 36, 0.18));
      color: var(--text-strong);
      box-shadow: 0 0 0 1px rgba(199, 59, 53, 0.08);
    }

    .radio-pill input {
      accent-color: var(--accent);
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 13px 18px;
      background: linear-gradient(180deg, var(--accent-bright), var(--accent-deep));
      color: #fff8ea;
      font: inherit;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(199, 59, 53, 0.2), inset 0 1px 0 rgba(255, 248, 234, 0.15);
      transition: transform 0.16s ease, filter 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.07);
    }

    button:active {
      transform: translateY(0);
    }

    .secondary-button {
      background: rgba(255, 248, 234, 0.045);
      border: 1px solid var(--line);
      color: var(--text);
      box-shadow: none;
    }

    .secondary-button:hover {
      background: rgba(255, 248, 234, 0.075);
      border-color: var(--line-strong);
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      min-height: 38px;
      margin-bottom: 16px;
    }

    .status {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .status.error {
      color: var(--danger);
      font-weight: 800;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .role-card {
      display: grid;
      gap: 12px;
      min-height: 190px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(145deg, var(--panel-soft), rgba(38, 34, 30, 0.94)),
        radial-gradient(circle at 0% 0%, rgba(211, 157, 86, 0.08), transparent 14rem);
      box-shadow: 0 16px 38px var(--shadow), inset 0 1px 0 rgba(255, 248, 234, 0.035);
    }

    .role-card:hover {
      border-color: rgba(225, 210, 177, 0.18);
    }

    .role-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .player-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--gold-soft);
      color: #d1b98d;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .role-id {
      color: var(--accent-bright);
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .role-name {
      margin: 0;
      color: var(--text-strong);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.3rem;
      line-height: 1.16;
    }

    textarea {
      width: 100%;
      min-height: 86px;
      resize: vertical;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(34, 31, 28, 0.92);
      color: var(--text);
      font: 0.94rem/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      outline: none;
    }

    textarea:focus {
      border-color: rgba(211, 157, 86, 0.55);
      box-shadow: 0 0 0 4px var(--gold-soft);
    }

    .copy-button {
      justify-self: start;
      padding: 11px 14px;
      font-size: 0.76rem;
    }

    .copy-button.copied,
    .secondary-button.copied {
      background: var(--success);
      color: #f5fff4;
      box-shadow: none;
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 26px;
      border: 1px dashed var(--line-strong);
      border-radius: 18px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 248, 234, 0.032);
    }



    .rich-copy-preview {
      display: flex;
      gap: 13px;
      align-items: center;
      width: 100%;
      min-height: 104px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(34, 31, 28, 0.92);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    .rich-copy-preview img {
      width: 74px;
      height: 74px;
      object-fit: contain;
      flex: 0 0 auto;
      border-radius: 13px;
      border: 1px solid rgba(226, 74, 65, 0.55);
      background: rgba(0, 0, 0, 0.32);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
    }

    .rich-copy-preview .message-preview {
      margin: 0;
      min-width: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: var(--text-strong);
      font: 0.9rem/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .copy-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .copy-options .copy-button {
      justify-self: auto;
    }

    .rich-copy-hint {
      margin: 0;
      color: var(--muted-dark);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .image-warning {
      display: none;
      color: var(--danger);
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .role-card.missing-image .image-warning {
      display: block;
    }

    @media (max-width: 520px) {
      .rich-copy-preview {
        align-items: flex-start;
      }

      .rich-copy-preview img {
        width: 62px;
        height: 62px;
      }
    }

    @media (max-width: 760px) {
      main {
        width: min(100% - 20px, 1120px);
        padding-top: 22px;
      }

      .controls {
        grid-template-columns: 1fr;
        border-radius: 18px;
      }

      button {
        width: 100%;
      }

      .actions,
      .actions button {
        width: 100%;
      }
    }
  
  </style>
</head>
<body>
  <main>
    <header>
      <p class="eyebrow" data-i18n="eyebrow">Lobisomens na Torre Sangrenta</p>
      <h1 data-i18n="title">Gerador de mensagens</h1>
      <p class="subtitle" data-i18n="subtitle">
        Escolhe o número de jogadores e a língua. A página gera uma mensagem privada por jogador, agora com a carta e o texto prontos a copiar.
      </p>
    </header>

    <section class="controls" aria-label="Generator controls">
      <div class="field">
        <label for="playerCount" data-i18n="playerCountLabel">Número de jogadores</label>
        <input id="playerCount" type="number" min="8" step="1" value="10" inputmode="numeric" />
      </div>

      <fieldset>
        <legend data-i18n="languageLegend">Língua</legend>
        <div class="radio-row">
          <label class="radio-pill">
            <input type="radio" name="language" value="PT" checked />
            Português
          </label>
          <label class="radio-pill">
            <input type="radio" name="language" value="FR" />
            Français
          </label>
        </div>
      </fieldset>

      <button id="generateButton" type="button" data-i18n="generateButton">Gerar personagens</button>
    </section>

    <div class="status-row">
      <p id="status" class="status" data-status-kind="empty">Ainda não há personagens geradas.</p>
      <div class="actions">
        <button id="copyAllButton" class="secondary-button" type="button" hidden data-i18n="copyAllRichButton">Copiar tudo com imagens</button>
        <button id="copyAllTextButton" class="secondary-button" type="button" hidden data-i18n="copyAllTextButton">Copiar tudo em texto</button>
      </div>
    </div>

    <section id="results" class="grid" aria-live="polite">
      <div class="empty-state" data-i18n="emptyState">As mensagens geradas aparecerão aqui.</div>
    </section>
  </main>

    const playerCountInput = document.querySelector("#playerCount");
    const generateButton = document.querySelector("#generateButton");
    const copyAllButton = document.querySelector("#copyAllButton");
    const copyAllTextButton = document.querySelector("#copyAllTextButton");
    const results = document.querySelector("#results");
    const status = document.querySelector("#status");

    let currentRoleIds = [];
    let currentPayloads = [];

    function getWerewolfCount(playerCount) {
      if (playerCount < 12) return 2;
      if (playerCount < 18) return 3;
      return 3 + Math.floor((playerCount - 18) / 6);
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function assignRoles(playerCount, advancedEnabled = false) {
      const roles = [];
      roles.push(...ESSENTIAL_SINGLES);

      const wwCount = getWerewolfCount(playerCount);

      if (playerCount < 12) {
        for (let i = 0; i < wwCount; i++) roles.push("e01");
      } else {
        roles.push("e01");
        const remainingWW = wwCount - 1;
        const shuffledSpecialWW = shuffle(SPECIAL_WEREWOLVES);
        let specialUsed = 0;

        for (let i = 0; i < remainingWW; i++) {
          if (specialUsed < shuffledSpecialWW.length) {
            roles.push(shuffledSpecialWW[specialUsed]);
            specialUsed++;
          } else {
            roles.push("e01");
          }
        }
      }

      const assigned = new Set(roles);

      if (roles.length < playerCount) {
        const shuffledInfo = shuffle(INFO_ROLES);
        for (const id of shuffledInfo) {
          if (!assigned.has(id)) {
            roles.push(id);
            assigned.add(id);
            break;
          }
        }
      }

      const shuffledVillagers = shuffle(VILLAGER_UNIQUE);
      for (const id of shuffledVillagers) {
        if (roles.length >= playerCount) break;
        const def = ROLE_DEFS[id];
        if (def.requires && !assigned.has(def.requires)) continue;
        if (assigned.has(id)) continue;
        roles.push(id);
        assigned.add(id);
      }

      if (advancedEnabled) {
        const shuffledAdvanced = shuffle(ADVANCED_ROLES);
        for (const id of shuffledAdvanced) {
          if (roles.length >= playerCount) break;
          const def = ROLE_DEFS[id];
          if (def.requires && !assigned.has(def.requires)) continue;
          if (assigned.has(id)) continue;
          roles.push(id);
          assigned.add(id);
        }
      }

      const shuffledOther = shuffle(OTHER_UNIQUE);
      for (const id of shuffledOther) {
        if (roles.length >= playerCount) break;
        if (assigned.has(id)) continue;
        roles.push(id);
        assigned.add(id);
      }

      for (const lameId of LAME_SINGLES) {
        if (roles.length >= playerCount) break;
        if (!assigned.has(lameId)) {
          roles.push(lameId);
          assigned.add(lameId);
        }
      }

      if (roles.length + 2 <= playerCount && !assigned.has("l03")) {
        roles.push("l03", "l03");
        assigned.add("l03");
      }

      if (roles.length + 3 <= playerCount && !assigned.has("l04")) {
        roles.push("l04", "l04", "l04");
        assigned.add("l04");
      }

      while (roles.length < playerCount) {
        roles.push("l01");
      }

      return shuffle(roles);
    }

    function getSelectedLanguage() {
      return document.querySelector('input[name="language"]:checked').value;
    }

    function getUiText(language = getSelectedLanguage()) {
      return UI_TEXT[language];
    }

    function getLabels(language) {
      return language === "FR" ? ROLE_LABELS_FR : ROLE_LABELS_PT;
    }

    function getRoleLink(id, language) {
      return `${BASE_URLS[language]}#${id}`;
    }

    function getRoleImageUrl(id) {
      const path = ROLE_IMAGE_PATHS[id] || `art/final/${id}_final.png`;
      return new URL(path, IMAGE_ROOT).href;
    }

    function createRoleMessage(id, language) {
      const labels = getLabels(language);
      const name = labels[id] || id;
      const link = getRoleLink(id, language);

      if (language === "FR") {
        return `Ton personnage est ${id}.${name} :\n${link}`;
      }

      return `O teu personagem é ${id}.${name} :\n${link}`;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function createRolePayload(id, language) {
      const labels = getLabels(language);
      const name = labels[id] || id;
      const link = getRoleLink(id, language);
      const imageUrl = getRoleImageUrl(id);
      const message = createRoleMessage(id, language);
      const safeId = escapeHtml(id);
      const safeName = escapeHtml(name);
      const safeLink = escapeHtml(link);
      const safeImageUrl = escapeHtml(imageUrl);
      const languageLine = language === "FR" ? "Ton personnage est" : "O teu personagem é";

      const html = `
        <div style="display:flex;gap:12px;align-items:center;font-family:Georgia,'Times New Roman',serif;color:#2d231f;max-width:520px;">
          <img src="${safeImageUrl}" alt="${safeId}.${safeName}" style="width:92px;height:92px;object-fit:contain;border-radius:12px;border:1px solid #7d2424;background:#211d19;">
          <div style="font-size:16px;line-height:1.35;">
            <div>${languageLine} <strong>${safeId}.${safeName}</strong> :</div>
            <a href="${safeLink}">${safeLink}</a>
          </div>
        </div>
      `.trim();

      return { id, name, link, imageUrl, message, html };
    }

    async function copyPlainText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const temporaryTextarea = document.createElement("textarea");
      temporaryTextarea.value = text;
      temporaryTextarea.setAttribute("readonly", "");
      temporaryTextarea.style.position = "fixed";
      temporaryTextarea.style.left = "-9999px";
      document.body.appendChild(temporaryTextarea);
      temporaryTextarea.select();
      document.execCommand("copy");
      temporaryTextarea.remove();
    }

    async function copyRichContent(html, plainText) {
      if (navigator.clipboard && window.ClipboardItem && window.isSecureContext) {
        const htmlBlob = new Blob([html], { type: "text/html" });
        const textBlob = new Blob([plainText], { type: "text/plain" });
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": htmlBlob,
            "text/plain": textBlob
          })
        ]);
        return true;
      }

      await copyPlainText(plainText);
      return false;
    }

    function setTemporaryButtonState(button, label) {
      const originalLabel = button.textContent;
      button.textContent = label;
      button.classList.add("copied");
      setTimeout(() => {
        button.textContent = originalLabel;
        button.classList.remove("copied");
      }, 1300);
    }

    function setStatus(text, kind = "normal") {
      status.textContent = text;
      status.dataset.statusKind = kind;
      status.classList.toggle("error", kind === "error");
    }

    function updateStaticInterface() {
      const language = getSelectedLanguage();
      const text = getUiText(language);
      document.documentElement.lang = language === "FR" ? "fr" : "pt";
      document.title = text.pageTitle;

      document.querySelectorAll("[data-i18n]").forEach((element) => {
        const key = element.dataset.i18n;
        if (typeof text[key] === "string") element.textContent = text[key];
      });

      if (status.dataset.statusKind === "empty") setStatus(text.emptyStatus, "empty");
    }

    function renderEmptyState(language = getSelectedLanguage()) {
      const text = getUiText(language);
      results.innerHTML = `<div class="empty-state">${escapeHtml(text.emptyState)}</div>`;
      copyAllButton.hidden = true;
      copyAllTextButton.hidden = true;
      currentPayloads = [];
      currentRoleIds = [];
      setStatus(text.emptyStatus, "empty");
    }

    function renderRoles(roleIds, language) {
      const text = getUiText(language);
      currentRoleIds = [...roleIds];
      currentPayloads = roleIds.map((id) => createRolePayload(id, language));
      results.innerHTML = "";

      currentPayloads.forEach((payload, index) => {
        const article = document.createElement("article");
        article.className = "role-card";
        article.innerHTML = `
          <div class="role-top">
            <span class="player-badge">${escapeHtml(text.player(index + 1))}</span>
            <span class="role-id">${escapeHtml(payload.id)}</span>
          </div>
          <h2 class="role-name">${escapeHtml(payload.name)}</h2>
          <div class="rich-copy-preview" aria-label="${escapeHtml(payload.message)}">
            <img src="${escapeHtml(payload.imageUrl)}" alt="${escapeHtml(payload.id)}.${escapeHtml(payload.name)}">
            <p class="message-preview">${escapeHtml(payload.message)}</p>
          </div>
          <p class="image-warning">${escapeHtml(text.missingImage)}</p>
          <p class="rich-copy-hint">${escapeHtml(text.richCopyHint)}</p>
          <div class="copy-options">
            <button class="copy-button copy-rich-button" type="button" aria-label="${escapeHtml(text.ariaCopyRich(payload.id, payload.name))}">${escapeHtml(text.copyRich)}</button>
            <button class="copy-button secondary-button copy-text-button" type="button" aria-label="${escapeHtml(text.ariaCopyText(payload.id, payload.name))}">${escapeHtml(text.copyText)}</button>
          </div>
        `;

        const image = article.querySelector("img");
        image.addEventListener("error", () => article.classList.add("missing-image"));

        const richButton = article.querySelector(".copy-rich-button");
        richButton.addEventListener("click", async () => {
          const usedRichCopy = await copyRichContent(payload.html, payload.message);
          setTemporaryButtonState(richButton, usedRichCopy ? text.copied : text.copiedFallback);
        });

        const textButton = article.querySelector(".copy-text-button");
        textButton.addEventListener("click", async () => {
          await copyPlainText(payload.message);
          setTemporaryButtonState(textButton, text.copiedText);
        });

        results.appendChild(article);
      });

      copyAllButton.hidden = currentPayloads.length === 0;
      copyAllTextButton.hidden = currentPayloads.length === 0;
      setStatus(text.generated(roleIds.length), "generated");
    }

    function generateRoles() {
      const playerCount = Number.parseInt(playerCountInput.value, 10);
      const language = getSelectedLanguage();
      const text = getUiText(language);

      if (!Number.isInteger(playerCount) || playerCount < 8) {
        setStatus(text.invalidPlayers, "error");
        results.innerHTML = `<div class="empty-state">${escapeHtml(text.noRoles)}</div>`;
        copyAllButton.hidden = true;
        copyAllTextButton.hidden = true;
        currentPayloads = [];
        currentRoleIds = [];
        return;
      }

      renderRoles(assignRoles(playerCount, false), language);
    }

    generateButton.addEventListener("click", generateRoles);

    copyAllButton.addEventListener("click", async () => {
      if (currentPayloads.length === 0) return;
      const text = getUiText();
      const html = `<div>${currentPayloads.map((payload) => payload.html).join("<br><br>")}</div>`;
      const plainText = currentPayloads.map((payload) => payload.message).join("\n\n");
      const usedRichCopy = await copyRichContent(html, plainText);
      setTemporaryButtonState(copyAllButton, usedRichCopy ? text.allCopied : text.copiedFallback);
    });

    copyAllTextButton.addEventListener("click", async () => {
      if (currentPayloads.length === 0) return;
      const text = getUiText();
      await copyPlainText(currentPayloads.map((payload) => payload.message).join("\n\n"));
      setTemporaryButtonState(copyAllTextButton, text.allTextCopied);
    });

    playerCountInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") generateRoles();
    });

    document.querySelectorAll('input[name="language"]').forEach((radio) => {
      radio.addEventListener("change", () => {
        updateStaticInterface();
        if (currentRoleIds.length > 0) {
          renderRoles(currentRoleIds, getSelectedLanguage());
        } else {
          renderEmptyState(getSelectedLanguage());
        }
      });
    });

    updateStaticInterface();
    renderEmptyState(getSelectedLanguage());
  </script>
